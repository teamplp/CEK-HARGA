<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Cek Harga</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    overflow:hidden;
}

/* PAGE */
.page{
    width:100vw;
    height:100vh;
    display:none;
}

.active{
    display:flex;
}

/* ================= HOME ================= */

#homePage{
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    color:#fff;
    text-align:center;
}

#homePage h1{
    font-size:50px;
    margin-bottom:10px;
}

#homePage p{
    font-size:22px;
    opacity:.8;
    margin-bottom:50px;
}

.menuBtn{
    width:320px;
    padding:22px;
    margin:12px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-size:28px;
    font-weight:bold;
    transition:.2s;
}

.menuBtn:hover{
    transform:scale(1.04);
}

.dbBtn{
    background:#16a34a;
    color:#fff;
}

.cekBtn{
    background:#2563eb;
    color:#fff;
}

/* ================= CEK HARGA ================= */

#checkPage{
    background:#0f172a;
    color:#fff;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.title{
    font-size:50px;
    font-weight:bold;
}

.ready{
    font-size:24px;
    opacity:.8;
    margin-top:15px;
    margin-bottom:35px;
}

.label{
    font-size:22px;
    opacity:.8;
    margin-top:15px;
}

.code{
    font-size:35px;
    font-weight:bold;
}

.name{
    font-size:25px;
    font-weight:900;
    width:90%;
    line-height:1.2;
    margin-top:10px;
}

.price{
    font-size:100px;
    font-weight:900;
    margin-top:20px;
}

.backBtn{
    position:absolute;
    top:20px;
    left:20px;
    background:#334155;
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

.scanBtn{
    position:absolute;
    top:20px;
    right:20px;
    background:#2563eb;
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
}

video{
    width:180px;
    position:fixed;
    bottom:15px;
    left:15px;
    border-radius:14px;
    border:2px solid #334155;
    display:none;
}

/* ================= DATABASE ================= */

#dbPage{
    background:#f1f5f9;
    justify-content:center;
    align-items:center;
}

.card{
    width:min(700px,90%);
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.card h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-top:10px;
    margin-bottom:15px;
}

.uploadBtn{
    background:#16a34a;
    color:#fff;
    border:none;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    width:100%;
}

.pinBtn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    width:100%;
}

.homeBtn{
    margin-top:20px;
    width:100%;
    background:#334155;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

<h1>SISTEM CEK HARGA</h1>
<p>Pilih Menu</p>

<button class="menuBtn dbBtn"
onclick="openDatabase()">
📦 DATABASE
</button>

<button class="menuBtn cekBtn"
onclick="showCheckPage()">
🏷️ CEK HARGA
</button>

</div>

<!-- CEK HARGA -->
<div id="checkPage" class="page">

<button class="backBtn"
onclick="goHome()">
← Home
</button>

<button class="scanBtn"
onclick="startCamera()">
📷 Scan
</button>

<div class="title">
CEK HARGA BARANG
</div>

<div class="ready">
Silakan scan barcode...
</div>

<div class="label">
KODE BARANG
</div>

<div id="kodeBarang"
class="code">
-
</div>

<div class="label">
HARGA
</div>

<div id="hargaBarang"
class="price">
-
</div>

<div class="label">
NAMA BARANG
</div>

<div id="namaBarang"
class="name">
-
</div>

<video id="video" autoplay></video>

</div>

<!-- DATABASE -->
<div id="dbPage" class="page">

<div class="card">

<h2>Database Barang</h2>

<p>
Format Excel:
<b>KODE | NAMA BARANG | HARGA</b>
</p>

<input type="file"
id="excelFile"
accept=".xlsx,.xls">

<button class="uploadBtn"
onclick="uploadExcel()">
Upload Database
</button>

<br><br>

<h3>Ubah PIN</h3>

<input type="password"
id="newPin"
placeholder="Masukkan PIN baru">

<button class="pinBtn"
onclick="changePin()">
Simpan PIN
</button>

<br><br>

<b>Jumlah Data:</b>
<span id="jumlahData">0</span>
    
<br><br>

<button class="uploadBtn"
onclick="exportHistory()">
📄 Export Hasil Scan
</button>

<br><br>
    
<button class="homeBtn"
onclick="goHome()">
← Kembali
</button>

</div>

</div>

<script>

let database =
JSON.parse(
localStorage.getItem("database")
) || [];

let historyScan =
JSON.parse(
localStorage.getItem("historyScan")
) || [];

let pin =
localStorage.getItem("pin_app")
|| "1234";

document.getElementById(
"jumlahData"
).innerText =
database.length;

let scanBuffer="";
let resetTimer;
let scanTimeout;
let isScanning=false;

function goHome(){

hideAllPages();

document.getElementById(
"homePage"
).classList.add("active");
}

function showCheckPage(){

hideAllPages();

document.getElementById(
"checkPage"
).classList.add("active");
}

function openDatabase(){

const inputPin =
prompt("Masukkan PIN");

if(inputPin===pin){

hideAllPages();

document.getElementById(
"dbPage"
).classList.add("active");

}else if(inputPin!==null){

alert("PIN salah");
}
}

function hideAllPages(){

document.querySelectorAll(
".page"
).forEach(
page=>page.classList.remove(
"active"
));
}

function changePin(){

const newPin =
document.getElementById(
"newPin"
).value.trim();

if(newPin.length < 4){

alert(
"PIN minimal 4 digit"
);

return;
}

pin = newPin;

localStorage.setItem(
"pin_app",
newPin
);

alert(
"PIN berhasil diubah"
);

document.getElementById(
"newPin"
).value="";
}

function uploadExcel(){

const file =
document.getElementById(
"excelFile"
).files[0];

if(!file){

alert(
"Pilih file Excel"
);

return;
}

const reader =
new FileReader();

reader.onload =
function(e){

const data =
new Uint8Array(
e.target.result
);

const workbook =
XLSX.read(data,{
type:"array"
});

const sheet =
workbook.Sheets[
workbook.SheetNames[0]
];

const json =
XLSX.utils.sheet_to_json(
sheet
);

database =
json.map(item=>({

KODE:String(
item.KODE || ""
).trim(),

NAMA_BARANG:
item["NAMA BARANG"]
|| "",

HARGA:
item.HARGA || ""

}));

localStorage.setItem(
"database",
JSON.stringify(
database
));

document.getElementById(
"jumlahData"
).innerText =
database.length;

alert(
"Database berhasil diupload"
);
};

reader.readAsArrayBuffer(
file
);
}

function formatRupiah(value){

if(!value)
return "-";

let text =
String(value).trim();

text =
text.replace(/rp/gi,"");

let clean =
text.replace(/[^\d]/g,"");

let number =
parseInt(clean);

if(isNaN(number))
return "-";

return "Rp " +
number.toLocaleString(
"id-ID"
);
}

function searchProduct(kode){

kode =
String(kode).trim();

const item =
database.find(
x =>
String(x.KODE).trim()
=== kode
);

document.getElementById(
"kodeBarang"
).innerText =
kode;

if(item){

document.getElementById(
"namaBarang"
).innerText =
item.NAMA_BARANG;

document.getElementById(
"hargaBarang"
).innerText =
formatRupiah(
item.HARGA
);

historyScan.push({
KODE:item.KODE,
NAMA_BARANG:item.NAMA_BARANG,
HARGA:item.HARGA
});
localStorage.setItem(
"historyScan",
JSON.stringify(historyScan)
);

}else{

document.getElementById(
"namaBarang"
).innerText =
"PERIKSA ULANG BARCODE";

document.getElementById(
"hargaBarang"
).innerText =
"-";
}

clearTimeout(
resetTimer
);

resetTimer =
setTimeout(
resetDisplay,
5000
);
}

function resetDisplay(){

document.getElementById(
"kodeBarang"
).innerText="-";

document.getElementById(
"namaBarang"
).innerText="-";

document.getElementById(
"hargaBarang"
).innerText="-";
}

document.addEventListener(
"keydown",
function(e){

if(
!document.getElementById(
"checkPage"
).classList.contains(
"active"
)
)return;

clearTimeout(
scanTimeout
);

if(e.key==="Enter"){

if(
scanBuffer.trim()
){

searchProduct(
scanBuffer.trim()
);

scanBuffer="";
}

}else if(
e.key.length===1
){

scanBuffer +=
e.key;
}

scanTimeout =
setTimeout(
()=>scanBuffer="",
100
);
});

async function startCamera(){

const video =
document.getElementById(
"video"
);

video.style.display=
"block";

const stream =
await navigator
.mediaDevices
.getUserMedia({

video:{
facingMode:
"environment"
}

});

video.srcObject =
stream;

if(
"BarcodeDetector"
in window
){

const detector =
new BarcodeDetector({

formats:[
"ean_13",
"ean_8",
"code_128",
"qr_code"
]

});

setInterval(
async()=>{

if(isScanning)
return;

const codes =
await detector.detect(
video
);

if(
codes.length
){

isScanning =
true;

searchProduct(
codes[0].rawValue
);

setTimeout(
()=>{
isScanning=false;
},
2000
);
}

},500);

}else{

alert(
"Browser tidak support scan kamera"
);
}
}

</script>

</body>
</html>
